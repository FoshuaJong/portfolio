<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0e">
  <meta http-equiv="refresh" content="3;url=https://joshua.fong.nz/">
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #0C0C0E;
      --text-primary: #E8E6E3;
      --text-secondary: #9B9A97;
      --accent: #3DA899;
      --accent-surface: rgba(61, 168, 153, 0.08);
      --accent-border: rgba(61, 168, 153, 0.35);
      --accent-border-hover: rgba(61, 168, 153, 0.6);
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'Outfit', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 480px;
    }

    .code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 20vw, 8rem);
      color: var(--accent);
      line-height: 1;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 1.25rem;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9375rem;
      border: 1px solid var(--accent-border);
      padding: 0.6rem 1.4rem;
      transition: background 0.2s, border-color 0.2s;
    }

    a:hover {
      background: var(--accent-surface);
      border-color: var(--accent-border-hover);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>That page doesn't exist. Redirecting you home in a moment…</p>
    <a href="https://joshua.fong.nz/">Take me home</a>
  </div>
</body>
</html>
