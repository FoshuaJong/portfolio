<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joshua Fong — CV</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0C0C0E;
      color: #E8E6E3;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    object {
      display: block;
      width: 100%;
      height: 100%;
    }

    .fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
      font-family: system-ui, sans-serif;
    }

    .fallback .label {
      font-family: monospace;
      font-size: 0.7rem;
      color: #C45D3E;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .fallback p {
      color: #9B9A97;
      font-size: 1rem;
      line-height: 1.7;
    }

    .fallback a {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #C45D3E;
      color: #E8E6E3;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }

    .fallback a:hover {
      background: #d4694c;
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(196, 93, 62, 0.25);
    }
  </style>
</head>
<body>
  <div id="grid-spotlight"></div>
  <script>
    (function(){var g=document.getElementById('grid-spotlight');document.addEventListener('mousemove',function(e){g.style.setProperty('--mx',e.clientX+'px');g.style.setProperty('--my',e.clientY+'px');});document.addEventListener('mouseleave',function(){g.style.setProperty('--mx','-999px');g.style.setProperty('--my','-999px');});})();
  </script>
  <object data="cv.pdf" type="application/pdf">
    <div class="fallback">
      <span class="label">CV / Résumé</span>
      <p>Your browser doesn't support inline PDFs.</p>
      <a href="cv.pdf" download>Download CV</a>
    </div>
  </object>
</body>
</html>
